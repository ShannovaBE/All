<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b8f3ff"/>
      <stop offset="0.55" stop-color="#d7f5ff"/>
      <stop offset="1" stop-color="#f2fbff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12274a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#12274a" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12274a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#g)"/>

  <!-- soft bokeh -->
  <circle cx="150" cy="120" r="90" fill="#7dd3fc" opacity="0.25"/>
  <circle cx="280" cy="210" r="70" fill="#60a5fa" opacity="0.18"/>
  <circle cx="1040" cy="140" r="120" fill="#818cf8" opacity="0.16"/>
  <circle cx="980" cy="620" r="160" fill="#38bdf8" opacity="0.14"/>

  <!-- dashboard card -->
  <g filter="url(#s)">
    <rect x="120" y="130" width="960" height="500" rx="26" fill="url(#panel)"/>
    <rect x="160" y="175" width="280" height="18" rx="9" fill="#e2e8f0" opacity="0.7"/>
    <rect x="160" y="212" width="420" height="12" rx="6" fill="#e2e8f0" opacity="0.35"/>
    <rect x="160" y="240" width="360" height="12" rx="6" fill="#e2e8f0" opacity="0.25"/>

    <rect x="160" y="290" width="420" height="260" rx="18" fill="#0ea5e9" opacity="0.16"/>
    <rect x="610" y="290" width="430" height="120" rx="18" fill="#22c55e" opacity="0.14"/>
    <rect x="610" y="430" width="430" height="120" rx="18" fill="#f59e0b" opacity="0.12"/>

    <!-- chart -->
    <path d="M200 520 C280 470, 320 520, 395 470 C470 420, 520 450, 580 410" fill="none" stroke="#93c5fd" stroke-width="6" opacity="0.85"/>
    <circle cx="200" cy="520" r="6" fill="#93c5fd"/>
    <circle cx="395" cy="470" r="6" fill="#93c5fd"/>
    <circle cx="580" cy="410" r="6" fill="#93c5fd"/>
  </g>
</svg>
