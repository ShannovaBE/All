<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="0.55" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="device" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12274a" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#12274a" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12274a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <!-- greenery hints -->
  <circle cx="1060" cy="150" r="110" fill="#22c55e" opacity="0.10"/>
  <circle cx="1040" cy="190" r="70" fill="#16a34a" opacity="0.10"/>
  <circle cx="140" cy="620" r="140" fill="#22c55e" opacity="0.08"/>

  <!-- tablet device -->
  <g filter="url(#s)">
    <rect x="250" y="120" width="700" height="520" rx="40" fill="url(#device)"/>
    <rect x="290" y="170" width="620" height="420" rx="26" fill="#0f172a" opacity="0.78"/>

    <!-- ui elements -->
    <rect x="320" y="200" width="190" height="18" rx="9" fill="#e2e8f0" opacity="0.65"/>
    <rect x="320" y="235" width="260" height="12" rx="6" fill="#e2e8f0" opacity="0.28"/>

    <rect x="320" y="285" width="260" height="150" rx="18" fill="#60a5fa" opacity="0.22"/>
    <rect x="610" y="285" width="270" height="150" rx="18" fill="#a78bfa" opacity="0.18"/>
    <rect x="320" y="455" width="560" height="110" rx="18" fill="#38bdf8" opacity="0.14"/>

    <!-- line chart -->
    <path d="M360 520 C430 470, 500 545, 570 495 C650 440, 705 470, 820 420" fill="none" stroke="#93c5fd" stroke-width="6" opacity="0.82"/>
  </g>
</svg>
