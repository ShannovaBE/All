<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b7c3cf"/>
      <stop offset="0.55" stop-color="#4b5e74"/>
      <stop offset="1" stop-color="#203246"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="panelBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Left subject silhouette (abstract, blurred) -->
  <g filter="url(#softBlur)" opacity="0.85">
    <ellipse cx="520" cy="470" rx="260" ry="320" fill="#2b3240"/>
    <ellipse cx="560" cy="420" rx="210" ry="240" fill="#3a4254"/>
    <ellipse cx="485" cy="390" rx="170" ry="170" fill="#2c3342"/>
    <ellipse cx="600" cy="470" rx="120" ry="140" fill="#546074" opacity="0.9"/>
    <ellipse cx="625" cy="505" rx="85" ry="95" fill="#6a7890" opacity="0.85"/>
  </g>

  <!-- Mid-to-right divider pillar -->
  <rect x="1040" y="0" width="36" height="1080" fill="#12274a" opacity="0.35"/>

  <!-- Right "dashboard panels" (abstract, blurred) -->
  <g filter="url(#panelBlur)" opacity="0.8">
    <rect x="1120" y="150" width="620" height="360" rx="18" fill="#5e738a" opacity="0.55"/>
    <rect x="1150" y="180" width="250" height="18" rx="9" fill="#c6d1dd" opacity="0.55"/>
    <rect x="1150" y="220" width="360" height="14" rx="7" fill="#c6d1dd" opacity="0.35"/>
    <rect x="1150" y="252" width="310" height="14" rx="7" fill="#c6d1dd" opacity="0.25"/>

    <rect x="1460" y="205" width="240" height="150" rx="14" fill="#7aa6d8" opacity="0.55"/>
    <rect x="1460" y="375" width="240" height="105" rx="14" fill="#4cc9f0" opacity="0.35"/>
    <rect x="1150" y="305" width="260" height="160" rx="14" fill="#1b2a3d" opacity="0.25"/>
  </g>

  <!-- Soft vignette -->
  <rect width="1920" height="1080" fill="#12274a" opacity="0.12"/>
</svg>
